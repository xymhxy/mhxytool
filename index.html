<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦幻西游 · 愤怒计算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <!-- 登录遮罩层（始终存在） -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-header">
        <span class="login-icon">🔥</span>
        <h2 class="login-title">梦幻西游 · 愤怒计算器</h2>
        <p class="login-subtitle">请登录后使用</p>
      </div>
      <div class="login-body">
        <div class="login-field">
          <label class="login-label">账号</label>
          <input type="text" class="login-input" id="loginUsername" placeholder="请输入账号" autocomplete="username" />
        </div>
        <div class="login-field">
          <label class="login-label">密码</label>
          <div class="login-pwd-wrap">
            <input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" />
            <button class="login-eye-btn" id="loginEyeBtn" title="显示/隐藏密码">👁</button>
          </div>
        </div>
        <div class="login-error" id="loginError"></div>
        <button class="login-submit-btn" id="loginSubmitBtn">登 录</button>
      </div>
    </div>
  </div>

  <!-- 计算器应用容器（登录成功后由 JS 动态注入内容） -->
  <div id="appContainer" style="display:none;"></div>

  <script src="script.js"></script>
</body>
</html>
